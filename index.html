<style>
  :root{
    --page-bg: #f6f6f8;
    --surface: #ffffff;
    --surface-muted: #fafafb;
    --border: #eaeaee;
    --border-strong: #dededf;
    --text-primary: #17171a;
    --text-secondary: #6b6b74;
    --text-tertiary: #a3a3ab;
    --accent: #524cee;
    --accent-strong: #423bdb;
    --accent-tint: #f0effe;
    --danger: #e5484d;
    --danger-tint: #fdf1f1;
    --success: #2f9e6e;
    --success-tint: #f0faf5;
    --shadow-sm: 0 1px 2px rgba(20,20,30,0.04);
    --shadow-md: 0 2px 8px rgba(20,20,30,0.05), 0 1px 2px rgba(20,20,30,0.04);
    --shadow-lg: 0 12px 28px rgba(20,20,30,0.09), 0 2px 6px rgba(20,20,30,0.05);
    --radius-lg: 18px;
    --radius-md: 10px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --page-bg: #0f0f13;
      --surface: #18181e;
      --surface-muted: #1d1d24;
      --border: #29292f;
      --border-strong: #34343c;
      --text-primary: #f2f2f4;
      --text-secondary: #a3a3ac;
      --text-tertiary: #75757e;
      --accent: #7c76ff;
      --accent-strong: #8f8aff;
      --accent-tint: #201f3c;
      --danger: #ff6369;
      --danger-tint: #2c1417;
      --success: #3ecb8a;
      --success-tint: #10261c;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 2px 10px rgba(0,0,0,0.35);
      --shadow-lg: 0 16px 32px rgba(0,0,0,0.5);
    }
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  button{ touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
  input{ -webkit-tap-highlight-color:transparent; }
  body{
    margin:0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background:var(--page-bg);
    color:var(--text-primary);
    -webkit-font-smoothing:antialiased;
    padding:calc(40px + env(safe-area-inset-top)) calc(32px + env(safe-area-inset-right)) calc(60px + env(safe-area-inset-bottom)) calc(32px + env(safe-area-inset-left));
  }
  .wrap{
    max-width:1080px;
    margin:0 auto;
  }
  .top{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:20px;
    margin-bottom:28px;
  }
  h1{
    font-family:'Inter Tight', 'Inter', sans-serif;
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.02em;
    margin:0 0 6px;
    color:var(--text-primary);
  }
  .subtitle{
    color:var(--text-secondary);
    font-size:14px;
    margin:0;
    line-height:1.6;
  }
  .protocol{
    display:flex;
    align-items:center;
    gap:0;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:999px;
    padding:6px 8px;
    box-shadow:var(--shadow-sm);
  }
  .protocol .step{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 14px;
    border-radius:999px;
    font-size:13px;
    color:var(--text-secondary);
    white-space:nowrap;
  }
  .protocol .step .sw{
    width:7px; height:7px; border-radius:50%; flex-shrink:0;
  }
  .protocol .step b{ color:var(--text-primary); font-weight:600; }
  .protocol .sep{
    color:var(--border-strong);
    font-size:13px;
  }
  .controls{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:24px;
    flex-wrap:wrap;
    gap:14px;
  }
  #addMouseBtn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:var(--radius-sm);
    padding:11px 20px 11px 16px;
    font-family:inherit;
    font-size:14.5px;
    font-weight:600;
    cursor:pointer;
    box-shadow:var(--shadow-sm);
    transition:background .15s ease, transform .1s ease;
  }
  #addMouseBtn svg{ width:16px; height:16px; }
  #addMouseBtn:hover{ background:var(--accent-strong); }
  #addMouseBtn:active{ transform:scale(0.98); }

  .switch-row{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13.5px;
    color:var(--text-secondary);
    user-select:none;
  }
  .switch{
    position:relative;
    width:38px; height:22px;
    flex-shrink:0;
  }
  .switch input{
    opacity:0; width:0; height:0;
  }
  .switch .track{
    position:absolute; inset:0;
    background:var(--border-strong);
    border-radius:999px;
    cursor:pointer;
    transition:background .15s ease;
  }
  .switch .thumb{
    position:absolute;
    top:2px; left:2px;
    width:18px; height:18px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 1px 2px rgba(0,0,0,0.25);
    transition:transform .15s ease;
  }
  .switch input:checked + .track{ background:var(--accent); }
  .switch input:checked + .track .thumb{ transform:translateX(16px); }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(272px, 1fr));
    gap:18px;
  }
  .empty{
    text-align:center;
    color:var(--text-tertiary);
    padding:80px 20px;
    font-size:14.5px;
    border:1.5px dashed var(--border-strong);
    border-radius:var(--radius-lg);
  }

  .card{
    position:relative;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow-sm);
    overflow:hidden;
    transition:box-shadow .2s ease, border-color .2s ease;
  }
  .card-accent{
    height:4px;
    width:100%;
  }
  .card-inner{
    padding:18px 18px 20px;
  }
  .card.alert{
    box-shadow:var(--shadow-lg);
    border-color:color-mix(in srgb, var(--danger) 35%, var(--border));
  }
  .card.alert .card-accent{
    animation:accentPulse 1.4s ease-in-out infinite;
  }
  @keyframes accentPulse{
    0%,100%{ opacity:1; }
    50%{ opacity:.45; }
  }
  .card.done{
    background:var(--surface-muted);
  }

  .card-head{
    display:flex;
    align-items:center;
    gap:4px;
    margin-bottom:14px;
  }
  .name-input{
    flex:1;
    min-width:0;
    border:none;
    background:transparent;
    font-family:inherit;
    font-size:16px;
    font-weight:600;
    color:var(--text-primary);
    padding:5px 7px;
    border-radius:7px;
    text-overflow:ellipsis;
  }
  .name-input:hover{ background:var(--surface-muted); }
  .name-input:focus{
    background:var(--surface-muted);
    outline:none;
    box-shadow:0 0 0 2px var(--accent-tint), 0 0 0 1px var(--accent);
  }
  .del-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width:28px; height:28px;
    flex-shrink:0;
    border:none;
    background:transparent;
    color:var(--text-tertiary);
    cursor:pointer;
    border-radius:7px;
    transition:background .12s ease, color .12s ease;
  }
  .del-btn svg{ width:15px; height:15px; }
  .del-btn:hover{ background:var(--danger-tint); color:var(--danger); }

  .stage-tag{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11.5px;
    font-weight:600;
    letter-spacing:.02em;
    padding:4px 10px 4px 8px;
    border-radius:999px;
    margin-bottom:14px;
  }
  .stage-tag .sw{ width:6px; height:6px; border-radius:50%; }

  .timer{
    font-family:'Inter Tight', 'Inter', sans-serif;
    font-size:40px;
    font-weight:700;
    letter-spacing:-0.01em;
    font-variant-numeric: tabular-nums;
    color:var(--text-primary);
    margin:0 0 14px;
    line-height:1;
  }
  .timer.timer-zero{ color:var(--danger); }
  .timer.timer-idle{ color:var(--text-tertiary); }

  .progress-bg{
    background:var(--surface-muted);
    border:1px solid var(--border);
    border-radius:999px;
    height:6px;
    overflow:hidden;
    margin-bottom:14px;
  }
  .progress-fill{
    height:100%;
    border-radius:999px;
    transition:width .4s linear;
  }

  .alert-text{
    display:flex;
    align-items:flex-start;
    gap:8px;
    background:var(--danger-tint);
    color:var(--danger);
    font-size:13px;
    font-weight:500;
    line-height:1.5;
    padding:10px 11px;
    border-radius:var(--radius-sm);
    margin-bottom:12px;
  }
  .alert-text svg{ width:15px; height:15px; flex-shrink:0; margin-top:1px; }

  .next-btn{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    background:var(--danger);
    color:#fff;
    border:none;
    border-radius:var(--radius-sm);
    padding:11px;
    font-family:inherit;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    transition:background .12s ease, transform .1s ease;
  }
  .next-btn svg{ width:14px; height:14px; }
  .next-btn:hover{ background:#c93a3f; }
  .next-btn:active{ transform:scale(0.98); }

  .done-row{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .done-icon{
    width:34px; height:34px;
    border-radius:50%;
    background:var(--success-tint);
    color:var(--success);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .done-icon svg{ width:18px; height:18px; }
  .done-title{
    font-size:14.5px;
    font-weight:600;
    color:var(--text-primary);
    margin:0 0 2px;
  }
  .done-sub{
    font-size:12.5px;
    color:var(--text-tertiary);
    margin:0;
  }

  .stage-list{
    display:flex;
    gap:7px;
    margin-top:2px;
  }
  .dot{
    width:8px; height:8px;
    border-radius:50%;
    background:var(--border-strong);
    transition:background .2s ease, transform .2s ease;
  }
  .dot.past{ background:var(--text-tertiary); }
  .dot.current{ background:var(--accent); transform:scale(1.25); }

  footer{
    margin-top:36px;
    text-align:center;
    color:var(--text-tertiary);
    font-size:12.5px;
    line-height:1.6;
  }
  .wake-note{
    display:none;
    align-items:center;
    justify-content:center;
    gap:6px;
    margin-top:8px;
    font-size:12px;
    color:var(--success);
  }
  .wake-note.on{ display:flex; }
  .wake-note svg{ width:13px; height:13px; }

  @media (max-width: 640px){
    body{ padding:calc(20px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(44px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left)); }
    .wrap{ max-width:100%; }
    .top{ flex-direction:column; align-items:stretch; gap:14px; }
    h1{ font-size:21px; }
    .subtitle{ font-size:13px; }
    .protocol{
      width:100%;
      flex-wrap:wrap;
      justify-content:center;
      border-radius:14px;
      padding:8px;
      row-gap:4px;
    }
    .protocol .step{
      padding:5px 9px;
      font-size:11.5px;
      gap:5px;
    }
    .protocol .sep{ display:none; }
    .controls{ flex-direction:column; align-items:stretch; gap:12px; }
    #addMouseBtn{
      width:100%;
      justify-content:center;
      padding:14px;
      font-size:15px;
    }
    .switch-row{
      justify-content:space-between;
      width:100%;
      padding:2px 2px;
    }
    .grid{ grid-template-columns:1fr; gap:14px; }
    .card-inner{ padding:16px; }
    .timer{ font-size:34px; margin-bottom:12px; }
    .del-btn{ width:38px; height:38px; }
    .del-btn svg{ width:16px; height:16px; }
    .next-btn{ padding:13px; }
    .empty{ padding:56px 16px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="top">
    <div>
      <h1>灌流タイマー</h1>
      <p class="subtitle">複数マウスを並行管理 &mdash; 各マウスが今どの段階か一目でわかります</p>
    </div>
    <div class="protocol" id="protocolBar"></div>
  </div>

  <div class="controls">
    <button id="addMouseBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      新しいマウスを開始
    </button>
    <label class="switch-row">
      <span class="switch">
        <input type="checkbox" id="soundToggle" checked>
        <span class="track"><span class="thumb"></span></span>
      </span>
      音声アラート
    </label>
  </div>

  <div id="miceGrid" class="grid"></div>
  <div id="emptyMsg" class="empty">「新しいマウスを開始」を押してマウスを追加してください</div>

  <footer>
    各段階が終わると音とハイライトでお知らせします。液を交換したら「次のステップへ」を押してください。<br>
    スマホでは実験中に画面が消えないよう、自動ロックをオフにするか、このタブを開いたままにしてください。
    <div class="wake-note" id="wakeNote"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>画面スリープ防止 ON</div>
  </footer>
</div>

<script>
var STAGE_LABELS = ["PFA潅流固定", "スクロース", "スクロース", "スクロース"];
var STAGE_SHORT = ["①", "②", "③", "④"];
var STAGE_MIN = [15, 5, 5, 5];
var STAGE_COLOR = ["#e5484d", "#3b82f6", "#2f6fea", "#1d4fd1"];

var STAGES = STAGE_LABELS.map(function(label, i){
  return { label: label, short: STAGE_SHORT[i], seconds: STAGE_MIN[i] * 60, color: STAGE_COLOR[i] };
});

var ICON_TRASH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>';
var ICON_BELL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>';
var ICON_ARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>';
var ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

var mice = [];
var nextId = 1;
var soundOn = true;
var cardRefs = new Map();
var wakeLock = null;

function unlockAudio(){
  try{
    if(!window._audioCtx){
      window._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(window._audioCtx.state === 'suspended'){
      window._audioCtx.resume();
    }
  }catch(e){}
}

function hasActiveMouse(){
  return mice.some(function(m){ return m.status === 'running' || m.status === 'awaiting'; });
}

function updateWakeLockUI(active){
  var note = document.getElementById('wakeNote');
  if(note) note.classList.toggle('on', !!active);
}

function requestWakeLock(){
  if(!('wakeLock' in navigator)) return;
  navigator.wakeLock.request('screen').then(function(lock){
    wakeLock = lock;
    updateWakeLockUI(true);
    wakeLock.addEventListener('release', function(){ updateWakeLockUI(false); });
  }).catch(function(){ updateWakeLockUI(false); });
}

function releaseWakeLockIfIdle(){
  if(!hasActiveMouse() && wakeLock){
    wakeLock.release().catch(function(){});
    wakeLock = null;
    updateWakeLockUI(false);
  }
}

document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible'){
    tick();
    if(hasActiveMouse() && !wakeLock) requestWakeLock();
  }
});

function buildProtocolBar(){
  var bar = document.getElementById('protocolBar');
  var groups = [];
  var i = 0;
  while(i < STAGES.length){
    var j = i;
    while(j + 1 < STAGES.length && STAGES[j+1].label === STAGES[i].label && STAGES[j+1].seconds === STAGES[i].seconds){
      j++;
    }
    groups.push({ start: i, end: j });
    i = j + 1;
  }
  var parts = [];
  groups.forEach(function(g, idx){
    var s = STAGES[g.start];
    var count = g.end - g.start + 1;
    var shorts = '';
    for(var k = g.start; k <= g.end; k++) shorts += STAGES[k].short;
    var minText = Math.round(s.seconds/60) + '分' + (count > 1 ? '×' + count : '');
    if(idx > 0) parts.push('<span class="sep">/</span>');
    parts.push('<span class="step"><span class="sw" style="background:' + s.color + '"></span>' + shorts + ' <b>' + s.label + '</b>&nbsp;' + minText + '</span>');
  });
  bar.innerHTML = parts.join('');
}

function beep(freq, duration, vol, delay){
  delay = delay || 0;
  setTimeout(function(){
    try{
      if(!window._audioCtx){
        window._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      var ctx = window._audioCtx;
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.value = vol;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration/1000);
    }catch(e){}
  }, delay);
}

function alertSound(){
  if(!soundOn) return;
  beep(1046, 150, 0.3, 0);
  beep(1318, 220, 0.3, 180);
}

function formatTime(sec){
  sec = Math.max(0, Math.ceil(sec));
  var m = Math.floor(sec/60);
  var s = sec%60;
  return m + ':' + String(s).padStart(2,'0');
}

function addMouse(){
  var id = nextId++;
  var mouse = {
    id: id,
    name: 'マウス ' + id,
    stageIndex: 0,
    status: 'running',
    endTime: Date.now() + STAGES[0].seconds*1000,
    lastBeep: 0
  };
  mice.push(mouse);
  buildCard(mouse);
  document.getElementById('emptyMsg').style.display = 'none';
  unlockAudio();
  if(!wakeLock) requestWakeLock();
}

function removeMouse(id){
  mice = mice.filter(function(m){ return m.id !== id; });
  var ref = cardRefs.get(id);
  if(ref) ref.root.remove();
  cardRefs.delete(id);
  if(mice.length === 0){
    document.getElementById('emptyMsg').style.display = 'block';
  }
  releaseWakeLockIfIdle();
}

function advanceStage(mouse){
  mouse.stageIndex++;
  if(mouse.stageIndex >= STAGES.length){
    mouse.status = 'done';
    mouse.endTime = null;
  } else {
    mouse.status = 'running';
    mouse.endTime = Date.now() + STAGES[mouse.stageIndex].seconds*1000;
  }
  rebuildCard(mouse);
  releaseWakeLockIfIdle();
}

function transitionToAwaiting(mouse){
  mouse.status = 'awaiting';
  mouse.lastBeep = Date.now();
  alertSound();
  rebuildCard(mouse);
}

function rebuildCard(mouse){
  var old = cardRefs.get(mouse.id);
  var el = renderCardElement(mouse);
  if(old){
    old.root.replaceWith(el.root);
  } else {
    document.getElementById('miceGrid').appendChild(el.root);
  }
  cardRefs.set(mouse.id, el);
}

function buildCard(mouse){
  var el = renderCardElement(mouse);
  document.getElementById('miceGrid').appendChild(el.root);
  cardRefs.set(mouse.id, el);
}

function tagBg(color){
  return 'background:color-mix(in srgb, ' + color + ' 14%, transparent); color:' + color + ';';
}

function renderCardElement(mouse){
  var stage = STAGES[mouse.stageIndex];
  var root = document.createElement('div');
  root.className = 'card' + (mouse.status === 'awaiting' ? ' alert' : '') + (mouse.status === 'done' ? ' done' : '');

  var bodyHtml = '';
  if(mouse.status === 'done'){
    bodyHtml =
      '<div class="done-row">' +
        '<div class="done-icon">' + ICON_CHECK + '</div>' +
        '<div>' +
          '<p class="done-title">全工程完了</p>' +
          '<p class="done-sub">4段階すべて終了しました</p>' +
        '</div>' +
      '</div>';
  } else if(mouse.status === 'awaiting'){
    var nextLabel = (mouse.stageIndex + 1 < STAGES.length) ? (STAGES[mouse.stageIndex+1].short + ' ' + STAGES[mouse.stageIndex+1].label) : '完了にする';
    bodyHtml =
      '<div class="stage-tag" style="' + tagBg(stage.color) + '"><span class="sw" style="background:' + stage.color + '"></span>' + stage.short + ' ' + stage.label + '</div>' +
      '<div class="timer timer-zero">0:00</div>' +
      '<div class="progress-bg"><div class="progress-fill" style="width:100%; background:' + stage.color + '"></div></div>' +
      '<div class="alert-text">' + ICON_BELL + '<span>' + stage.label + 'が終了しました。次の液に移してください</span></div>' +
      '<button class="next-btn">次のステップへ ' + ICON_ARROW + ' ' + nextLabel + '</button>';
  } else {
    var dotsHtml = '';
    for(var i = 0; i < STAGES.length; i++){
      var cls = 'dot';
      if(i < mouse.stageIndex) cls += ' past';
      if(i === mouse.stageIndex) cls += ' current';
      dotsHtml += '<span class="' + cls + '"></span>';
    }
    bodyHtml =
      '<div class="stage-tag" style="' + tagBg(stage.color) + '"><span class="sw" style="background:' + stage.color + '"></span>' + stage.short + ' ' + stage.label + '</div>' +
      '<div class="timer timer-idle">--:--</div>' +
      '<div class="progress-bg"><div class="progress-fill" style="width:0%; background:' + stage.color + '"></div></div>' +
      '<div class="stage-list">' + dotsHtml + '</div>';
  }

  root.innerHTML =
    '<div class="card-accent" style="background:' + (mouse.status === 'done' ? 'var(--success)' : stage.color) + '"></div>' +
    '<div class="card-inner">' +
      '<div class="card-head">' +
        '<input class="name-input" value="' + mouse.name + '">' +
        '<button class="del-btn" title="削除">' + ICON_TRASH + '</button>' +
      '</div>' +
      bodyHtml +
    '</div>';

  var nameInput = root.querySelector('.name-input');
  nameInput.addEventListener('input', function(){ mouse.name = nameInput.value; });

  var delBtn = root.querySelector('.del-btn');
  delBtn.addEventListener('click', function(){ removeMouse(mouse.id); });

  var nextBtn = root.querySelector('.next-btn');
  if(nextBtn){
    nextBtn.addEventListener('click', function(){ advanceStage(mouse); });
  }

  return {
    root: root,
    timerEl: root.querySelector('.timer'),
    progressEl: root.querySelector('.progress-fill')
  };
}

function tick(){
  mice.forEach(function(mouse){
    if(mouse.status !== 'running') return;
    var remaining = (mouse.endTime - Date.now()) / 1000;
    if(remaining <= 0){
      transitionToAwaiting(mouse);
      return;
    }
    var ref = cardRefs.get(mouse.id);
    if(ref){
      ref.timerEl.textContent = formatTime(remaining);
      var stage = STAGES[mouse.stageIndex];
      var pct = Math.min(100, 100 - (remaining / stage.seconds * 100));
      ref.progressEl.style.width = pct + '%';
    }
  });
  mice.forEach(function(mouse){
    if(mouse.status === 'awaiting' && Date.now() - mouse.lastBeep >= 8000){
      mouse.lastBeep = Date.now();
      alertSound();
    }
  });
}

buildProtocolBar();
document.getElementById('addMouseBtn').addEventListener('click', addMouse);
document.getElementById('soundToggle').addEventListener('change', function(e){ soundOn = e.target.checked; });

setInterval(tick, 500);
</script>

</body>
